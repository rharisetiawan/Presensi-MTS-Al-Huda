<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generator QR Card — MTS Al Huda Putri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- QRCode library — multi-CDN dengan fallback otomatis -->
  <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js" onerror="loadQRFallback()"></script>
  <script>
    function loadQRFallback() {
      // CDN pertama gagal → coba jsDelivr
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js';
      s.onerror = function() {
        // Kedua-duanya gagal → tandai pakai image API
        window._qrLibFailed = true;
        console.warn('QR library CDN tidak tersedia. Menggunakan QR image API sebagai fallback.');
      };
      document.head.appendChild(s);
    }
  </script>
  <script src="../assets/js/config.js"></script>
  <link rel="manifest" href="../dashboard/manifest.json" />
  <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico" />
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#10b981" />

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #10b981; --primary-dk: #059669;
  --warn: #f59e0b;
  --bg: #0a1628; --surface: #111f38; --surface2: #1a2e4a;
  --text: #f1f5f9; --text-muted: #64748b; --border: rgba(255,255,255,0.08);
}
body.light-mode {
  --bg: #f0f4f8; --surface: #ffffff; --surface2: #f1f5f9;
  --text: #1e293b; --text-muted: #64748b; --border: rgba(0,0,0,0.08);
}
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
}
.header-title { font-size: 18px; font-weight: 800; }
.header-sub { font-size: 12px; color: var(--text-muted); }
.back-btn { color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 600; }

.container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

/* Controls */
.controls {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px; margin-bottom: 28px;
}
.controls-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
.controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.form-select, .form-input {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  font-size: 14px; font-family: inherit; color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.form-select:focus, .form-input:focus { border-color: var(--primary); }
.controls-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px; border-radius: 10px;
  font-size: 14px; font-weight: 700; font-family: inherit;
  border: none; cursor: pointer; transition: all 0.15s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dk); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: #213654; }

/* Cards grid */
.cards-label { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; }
.cards-grid {
  display: grid; gap: 16px;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
}

/* QR Card */
.qr-card-wrap {
  cursor: pointer; transition: transform 0.2s;
}
.qr-card-wrap:hover { transform: translateY(-3px); }

/* Print styles */
@media print {
  body { background: white !important; }
  .header, .controls, .page-title, .cards-label { display: none !important; }
  .cards-grid {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 8px !important;
    padding: 4px !important;
  }
  .qr-card-wrap { page-break-inside: avoid; }
  .card-preview { box-shadow: none !important; }
}

/* ID Card design */
.card-preview {
  width: 190px; height: 120px; /* CR-80 proporsi 3:2 */
  border-radius: 10px;
  padding: 10px 12px;
  display: flex; flex-direction: column;
  font-family: 'Plus Jakarta Sans', sans-serif;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  position: relative; overflow: hidden;
  user-select: none;
}
.card-preview.theme-green {
  background: linear-gradient(135deg, #064e3b 0%, #065f46 50%, #047857 100%);
  border: 1px solid rgba(16,185,129,0.3);
}
.card-preview.theme-blue {
  background: linear-gradient(135deg, #1e3a5f 0%, #1e4080 50%, #1a56db 100%);
  border: 1px solid rgba(59,130,246,0.3);
}
.card-preview.theme-purple {
  background: linear-gradient(135deg, #3b0764 0%, #4c1d95 50%, #6d28d9 100%);
  border: 1px solid rgba(139,92,246,0.3);
}
.card-preview.theme-gold {
  background: linear-gradient(135deg, #451a03 0%, #78350f 50%, #92400e 100%);
  border: 1px solid rgba(245,158,11,0.3);
}

.card-header-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 6px;
}
.card-school-icon { font-size: 14px; }
.card-school-info { flex: 1; min-width: 0; }
.card-school-name {
  font-size: 7px; font-weight: 800; color: rgba(255,255,255,0.95);
  line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-year { font-size: 6px; color: rgba(255,255,255,0.6); }

.card-body-row { display: flex; gap: 8px; flex: 1; align-items: center; }
.card-qr { flex-shrink: 0; }
.card-qr canvas { border-radius: 4px; display: block; }
.card-info { flex: 1; min-width: 0; }
.card-type-label {
  font-size: 6px; font-weight: 700; color: rgba(255,255,255,0.6);
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px;
}
.card-name {
  font-size: 10px; font-weight: 800; color: #fff;
  line-height: 1.2; margin-bottom: 4px;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.card-id {
  font-size: 7.5px; color: rgba(255,255,255,0.75);
  font-family: monospace; font-weight: 600; letter-spacing: 0.05em;
}
.card-class {
  font-size: 7px; color: rgba(255,255,255,0.6); margin-top: 2px;
}

/* Decorative circles */
.card-deco {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.04);
  pointer-events: none;
}
.card-deco-1 { width: 60px; height: 60px; top: -20px; right: -20px; }
.card-deco-2 { width: 40px; height: 40px; bottom: -15px; left: 40px; }

/* Stripe at bottom */
.card-stripe {
  position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.3), rgba(255,255,255,0.1));
}

/* Loader */
.loader { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text-muted); gap: 10px; }
.spinner { width: 24px; height: 24px; border-radius: 50%; border: 3px solid var(--surface2); border-top-color: var(--primary); animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 20px;
  font-size: 13px; font-weight: 600;
  opacity: 0; pointer-events: none;
  transition: all 0.3s; transform: translateY(20px); z-index: 999;
}
#toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="splash-screen" style="position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.5s,visibility 0.5s">
  <img src="../assets/icons/logo-mts.png" alt="Logo" style="width:90px;height:90px;object-fit:contain;animation:splashPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both" />
  <div style="font-size:16px;font-weight:800;text-align:center;color:var(--text)">Generator QR Card<br/>MTS Al Huda Putri</div>
  <div style="width:140px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden">
    <div style="height:100%;background:#10b981;border-radius:2px;animation:splashLoad 1.5s 0.3s ease forwards;width:0"></div>
  </div>
</div>
<style>
  @keyframes splashPop  { from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1} }
  @keyframes splashLoad { from{width:0}to{width:100%} }
  .qr-footer{text-align:center;padding:12px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:8px}
  .qr-footer a{color:#10b981;text-decoration:none;font-weight:600}
  .theme-toggle-qr{background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:5px 10px;font-size:14px;cursor:pointer;color:var(--text);transition:all 0.2s}
  body.light-mode .qr-footer{background:#fff}
</style>
<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <img src="../assets/icons/logo-mts.png" alt="Logo" style="width:32px;height:32px;object-fit:contain" />
    <div>
      <div class="header-title">🪪 Generator QR Card</div>
      <div class="header-sub">MTS Al Huda Putri Malang</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="theme-toggle-qr" onclick="clearAppCache()" title="Perbarui aplikasi ke versi terbaru">🔄</button>
    <button class="theme-toggle-qr" id="qr-theme-btn" onclick="toggleQrTheme()">🌙</button>
    <a href="../dashboard/" class="back-btn">← Dashboard</a>
  </div>
</div>

<div class="container">
  <!-- Controls -->
  <div class="controls">
    <div class="controls-title">Pengaturan Kartu</div>
    <div class="controls-grid">
      <div class="form-group">
        <label class="form-label">Tipe</label>
        <select id="ctrl-tipe" class="form-select" onchange="onTipeChange()">
          <option value="siswa">🎓 Siswa</option>
          <option value="guru">👨‍🏫 Guru & Tendik</option>
        </select>
      </div>
      <div class="form-group" id="kelas-group">
        <label class="form-label">Filter Kelas</label>
        <select id="ctrl-kelas" class="form-select">
          <option value="">Semua Kelas</option>
          <!-- diisi oleh JS -->
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tema Warna</label>
        <select id="ctrl-theme" class="form-select">
          <option value="green">🟢 Hijau Emerald</option>
          <option value="blue">🔵 Biru Navy</option>
          <option value="purple">🟣 Ungu</option>
          <option value="gold">🟡 Emas/Coklat</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tahun Ajaran</label>
        <input id="ctrl-ta" class="form-input" type="text" value="${APP_CONFIG.TAHUN_AJARAN||'2026/2027'}" />
      </div>
    </div>
    <div class="controls-actions">
      <button class="btn btn-primary" onclick="generateCards()">🔄 Generate Kartu</button>
      <button class="btn btn-secondary" onclick="window.print()">🖨️ Print Semua</button>
    </div>
  </div>

  <!-- Output -->
  <div id="output">
    <div class="loader"><div class="spinner"></div> Klik "Generate Kartu" untuk memulai</div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = APP_CONFIG.API_URL;
let currentData = [];

// ── XSS protection ──
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

// ── Init: isi dropdown dan tahun ajaran dari config ──
(function initQRCard() {
  // Isi tahun ajaran
  const taInput = document.getElementById('ctrl-ta');
  if (taInput) taInput.value = APP_CONFIG.TAHUN_AJARAN || '2026/2027';

  // Isi dropdown kelas
  const kelasSel = document.getElementById('ctrl-kelas');
  const kelasList = APP_CONFIG.KELAS_LIST || ['VII', 'VIII', 'IX'];
  kelasList.forEach(k => {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = 'Kelas ' + k;
    kelasSel.appendChild(opt);
  });
})();

async function fetchData(tipe) {
  const action = tipe === 'siswa' ? 'get_students' : 'get_teachers';
  // Ambil session token dari sessionStorage (login dashboard)
  const sessionToken = sessionStorage.getItem('mts_session_token') || '';
  const res  = await fetch(`${API}?action=${action}&sessionToken=${sessionToken}`, { redirect: 'follow' });
  const text = await res.text();
  try {
    const json = JSON.parse(text);
    if (!json.success && json.code === 'UNAUTHORIZED') {
      throw new Error('Belum login. Silakan login ke Dashboard dulu, lalu buka Generator QR Card dari Dashboard.');
    }
    return json.data || [];
  }
  catch(e) { throw new Error(e.message || 'Gagal ambil data'); }
}

function onTipeChange() {
  const tipe = document.getElementById('ctrl-tipe').value;
  document.getElementById('kelas-group').style.display = tipe === 'siswa' ? 'flex' : 'none';
}

async function generateCards() {
  const tipe   = document.getElementById('ctrl-tipe').value;
  const kelas  = document.getElementById('ctrl-kelas').value;
  const theme  = document.getElementById('ctrl-theme').value;
  const ta     = document.getElementById('ctrl-ta').value;

  document.getElementById('output').innerHTML = '<div class="loader"><div class="spinner"></div> Memuat data dan membuat kartu...</div>';

  try {
    let data = await fetchData(tipe);
    if (kelas && tipe === 'siswa') data = data.filter(s => s.kelas === kelas);

    if (data.length === 0) {
      document.getElementById('output').innerHTML = '<div class="loader">Tidak ada data ditemukan</div>';
      return;
    }

    currentData = data;

    const cardsHtml = data.map((item, idx) => {
      const isSiswa = tipe === 'siswa';
      // [BUG-01] Prefix berdasarkan tipe — konsisten dengan routing di backend (prosesAbsen)
      let qrValue;
      if (isSiswa) {
        qrValue = `MTS-S-${item.nis}`;
      } else {
        const isTU = item.tipe && (item.tipe.toLowerCase().includes('tu') || item.tipe.toLowerCase().includes('tendik'));
        qrValue = `${isTU ? 'MTS-TU-' : 'MTS-G-'}${item.nig}`;
      }
      const name    = item.nama || '-';
      const id      = isSiswa ? item.nis : item.nig;
      const sub     = isSiswa ? `Kelas ${item.kelas}` : (item.jabatan || item.tipe || 'Guru');
      const typeLabel = isSiswa ? 'KARTU PELAJAR' : 'KARTU TENDIK';

      return `
      <div class="qr-card-wrap" id="card-${idx}">
        <div class="card-preview theme-${theme}">
          <div class="card-deco card-deco-1"></div>
          <div class="card-deco card-deco-2"></div>

          <div class="card-header-row">
            <div class="card-school-icon">🕌</div>
            <div class="card-school-info">
              <div class="card-school-name">MTS Al Huda Putri Malang</div>
              <div class="card-year">TA ${esc(ta)}</div>
            </div>
          </div>

          <div class="card-body-row">
            <div class="card-qr">
              <canvas id="qr-${idx}" width="52" height="52"></canvas>
            </div>
            <div class="card-info">
              <div class="card-type-label">${typeLabel}</div>
              <div class="card-name">${esc(name)}</div>
              <div class="card-id">${esc(id)}</div>
              <div class="card-class">${esc(sub)}</div>
            </div>
          </div>

          <div class="card-stripe"></div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('output').innerHTML = `
    <div class="cards-label">${data.length} kartu siap dicetak — klik kartu untuk preview QR</div>
    <div class="cards-grid">${cardsHtml}</div>`;

    // Generate QR codes — pakai library jika tersedia, fallback ke image API
    for (let i = 0; i < data.length; i++) {
      const item    = data[i];
      const isSiswa = tipe === 'siswa';
      // [BUG-01] Gunakan prefix yang sama persis dengan yang ada di kartu (konsisten)
      let qrValue;
      if (isSiswa) {
        qrValue = `MTS-S-${item.nis}`;
      } else {
        const isTU = item.tipe && (item.tipe.toLowerCase().includes('tu') || item.tipe.toLowerCase().includes('tendik'));
        qrValue = `${isTU ? 'MTS-TU-' : 'MTS-G-'}${item.nig}`;
      }
      const canvas  = document.getElementById(`qr-${i}`);
      if (canvas) await generateQR(canvas, qrValue);
    }

    showToast('✅ ' + data.length + ' kartu berhasil dibuat');
  } catch(e) {
    document.getElementById('output').innerHTML = '<div class="loader">Error: ' + e.message + '. Periksa koneksi dan URL API.</div>';
  }
}

// ── QR Generator — pakai library atau fallback ke image API ──
async function generateQR(canvas, qrValue) {
  // Coba pakai library QRCode.toCanvas (dimuat dari unpkg, fallback ke jsDelivr saat load gagal)
  if (typeof QRCode !== 'undefined' && typeof QRCode.toCanvas === 'function' && !window._qrLibFailed) {
    try {
      await QRCode.toCanvas(canvas, qrValue, {
        width: 52, margin: 1,
        color: { dark: '#FFFFFF', light: '#00000000' }
      });
      return;
    } catch(e) {
      console.warn('QRCode.toCanvas gagal:', e);
    }
  }

  // Fallback terakhir: tampilkan teks value QR. Sengaja TIDAK memakai image API
  // pihak ketiga (mis. qrserver.com) di sini — itu berarti mengirim NIS/NIG
  // siswa ke server luar, yang tidak sesuai untuk data pribadi anak.
  const span = document.createElement('div');
  span.style.cssText = 'width:52px;height:52px;font-size:6px;color:#fff;word-break:break-all;padding:2px;line-height:1.2;overflow:hidden;display:flex;align-items:center;justify-content:center;text-align:center';
  span.textContent = qrValue;
  canvas.parentNode.replaceChild(span, canvas);
}

// ── Perbarui aplikasi: bersihkan cache service worker versi lama ──
// Sesi login (sessionStorage) tidak disentuh agar tidak perlu login ulang.
async function clearAppCache() {
  if (!confirm('Perbarui aplikasi ke versi terbaru?\n\nCache akan dibersihkan dan halaman dimuat ulang.')) return;
  showToast('⏳ Membersihkan cache...');
  try {
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
  } catch (e) { /* sebagian gagal dibersihkan -> tetap lanjut reload */ }
  location.replace(location.pathname + '?v=' + Date.now());
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
onTipeChange();
</script>
<div class="qr-footer">Made with ❤️ by <a href="https://weverx.com" target="_blank" rel="noopener">weverx.com</a></div>
<script>
// Theme
(function(){
  const saved = localStorage.getItem('mts_theme');
  const isDark = saved ? saved === 'dark' : true;
  if (!isDark) {
    document.body.classList.add('light-mode');
    const btn = document.getElementById('qr-theme-btn');
    if (btn) btn.textContent = '☀️';
  }
  // Splash
  const splash = document.getElementById('splash-screen');
  if (splash) setTimeout(() => { splash.style.opacity='0'; splash.style.visibility='hidden'; }, 1600);
})();
function toggleQrTheme() {
  const isDark = !document.body.classList.contains('light-mode');
  if (isDark) { document.body.classList.add('light-mode'); document.getElementById('qr-theme-btn').textContent='☀️'; localStorage.setItem('mts_theme','light'); }
  else { document.body.classList.remove('light-mode'); document.getElementById('qr-theme-btn').textContent='🌙'; localStorage.setItem('mts_theme','dark'); }
}
</script>
</body>
</html>
