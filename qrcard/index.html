<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generator QR Card — MTS Al Huda Putri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- QRCode library — multi-CDN dengan fallback otomatis -->
  <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js" onerror="loadQRFallback()"></script>
  <script>
    function loadQRFallback() {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js';
      s.onerror = function() { window._qrLibFailed = true; };
      document.head.appendChild(s);
    }
  </script>
  <script src="../assets/js/config.js"></script>
  <link rel="manifest" href="../dashboard/manifest.json" />
  <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico" />
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#10b981" />

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #10b981; --primary-dk: #059669; --primary-lt: rgba(16,185,129,0.12);
  --warn: #f59e0b; --info: #3b82f6; --danger: #ef4444;
  --bg: #0a1628; --surface: #111f38; --surface2: #1a2e4a; --surface3: #213654;
  --text: #f1f5f9; --text-2: #cbd5e1; --text-muted: #64748b;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --radius: 12px;
}
body.light-mode {
  --bg: #f0f4f8; --surface: #ffffff; --surface2: #f1f5f9; --surface3: #e2e8f0;
  --text: #1e293b; --text-2: #334155; --text-muted: #64748b;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
}
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.header-title { font-size: 18px; font-weight: 800; }
.header-sub { font-size: 12px; color: var(--text-muted); }
.back-btn { color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 600; }

.container { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }

/* Controls */
.controls {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; margin-bottom: 24px;
}
.controls-title { font-size: 15px; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
.controls-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; }
@media (max-width: 768px) { .controls-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 480px) { .controls-grid { grid-template-columns: 1fr; } }

.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.form-select, .form-input {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  font-size: 14px; font-family: inherit; color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.form-select:focus, .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-lt); }
.controls-actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; align-items: center; }

/* ── FILTER SEARCH BAR (BARU) ── */
.search-bar-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 22px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.search-input-wrap { position: relative; flex: 1; min-width: 200px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--text-muted); pointer-events: none; }
#search-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 12px 10px 36px;
  font-size: 14px; font-family: inherit; color: var(--text); outline: none;
  transition: border-color 0.2s;
}
#search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-lt); }
#search-input::placeholder { color: var(--text-muted); }
.search-count {
  font-size: 13px; color: var(--text-muted); white-space: nowrap;
  min-width: 100px; text-align: right;
}
.search-bar-hidden { display: none; }

/* Btn */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px; border-radius: 10px;
  font-size: 14px; font-weight: 700; font-family: inherit;
  border: none; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dk); transform: translateY(-1px); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface3); }
.btn-info { background: #1d4ed8; color: #fff; }
.btn-info:hover { background: #1e40af; }
.btn-danger { background: #dc2626; color: #fff; }
.btn-danger:hover { background: #b91c1c; }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
.btn-xs { padding: 4px 9px; font-size: 11px; border-radius: 6px; gap: 4px; }

/* Stats bar */
.stats-bar {
  display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap;
}
.stat-pill {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 100px; padding: 5px 14px; font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.stat-pill .num { color: var(--primary); font-weight: 800; }
.stat-pill.selected-pill { background: var(--primary-lt); border-color: rgba(16,185,129,0.4); color: var(--primary); }

/* Cards grid */
.cards-grid {
  display: grid; gap: 16px;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
}
.card-wrap-outer {
  position: relative;
  transition: transform 0.2s;
}
.card-wrap-outer:hover { transform: translateY(-3px); }

/* Select checkbox overlay */
.card-select-overlay {
  position: absolute; top: 6px; right: 6px; z-index: 5;
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--surface2); border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.card-select-overlay.checked {
  background: var(--primary); border-color: var(--primary);
}
.card-select-overlay.checked::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 800; }

/* Card action bar (appears on hover) */
.card-actions {
  display: flex; gap: 6px; margin-top: 8px; justify-content: center;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.15s, transform 0.15s;
}
.card-wrap-outer:hover .card-actions { opacity: 1; transform: translateY(0); }

/* Hidden cards during search */
.card-wrap-outer.hidden { display: none; }

/* Print only selected */
.card-wrap-outer.print-exclude { display: none !important; }

/* Print styles */
@media print {
  body { background: white !important; }
  .header, .controls, .search-bar-wrap, .stats-bar, .page-title,
  .card-actions, .card-select-overlay, #toast, .qr-footer { display: none !important; }
  .cards-grid {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 8px !important;
    padding: 4px !important;
  }
  .card-wrap-outer { page-break-inside: avoid; }
  .card-preview { box-shadow: none !important; }
  .card-wrap-outer.print-exclude { display: none !important; }
}

/* ID Card design */
.card-preview {
  width: 100%; max-width: 210px; height: 133px; /* CR-80 proporsi 85.6×54mm */
  border-radius: 10px; padding: 10px 12px;
  display: flex; flex-direction: column;
  font-family: 'Plus Jakarta Sans', sans-serif;
  box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  position: relative; overflow: hidden; user-select: none;
  cursor: pointer;
}
.card-preview.theme-green { background: linear-gradient(135deg, #064e3b 0%, #065f46 50%, #047857 100%); border: 1px solid rgba(16,185,129,0.3); }
.card-preview.theme-blue  { background: linear-gradient(135deg, #1e3a5f 0%, #1e4080 50%, #1a56db 100%); border: 1px solid rgba(59,130,246,0.3); }
.card-preview.theme-purple{ background: linear-gradient(135deg, #3b0764 0%, #4c1d95 50%, #6d28d9 100%); border: 1px solid rgba(139,92,246,0.3); }
.card-preview.theme-gold  { background: linear-gradient(135deg, #451a03 0%, #78350f 50%, #92400e 100%); border: 1px solid rgba(245,158,11,0.3); }

.card-header-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.card-school-icon { font-size: 14px; }
.card-school-info { flex: 1; min-width: 0; }
.card-school-name { font-size: 7px; font-weight: 800; color: rgba(255,255,255,0.95); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-year { font-size: 6px; color: rgba(255,255,255,0.6); }
.card-body-row { display: flex; gap: 8px; flex: 1; align-items: center; }
.card-qr { flex-shrink: 0; }
.card-qr canvas { border-radius: 4px; display: block; }
.card-info { flex: 1; min-width: 0; }
.card-type-label { font-size: 6px; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
.card-name { font-size: 10px; font-weight: 800; color: #fff; line-height: 1.2; margin-bottom: 4px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.card-id { font-size: 7.5px; color: rgba(255,255,255,0.75); font-family: monospace; font-weight: 600; letter-spacing: 0.05em; }
.card-class { font-size: 7px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.card-deco { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.04); pointer-events: none; }
.card-deco-1 { width: 60px; height: 60px; top: -20px; right: -20px; }
.card-deco-2 { width: 40px; height: 40px; bottom: -15px; left: 40px; }
.card-stripe { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.3), rgba(255,255,255,0.1)); }

/* Loader */
.loader { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text-muted); gap: 10px; flex-direction: column; }
.spinner { width: 28px; height: 28px; border-radius: 50%; border: 3px solid var(--surface2); border-top-color: var(--primary); animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 20px; font-size: 13px; font-weight: 600;
  opacity: 0; pointer-events: none; transition: all 0.3s; transform: translateY(20px); z-index: 999;
}
#toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="splash-screen" style="position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.5s,visibility 0.5s">
  <img src="../assets/icons/logo-mts.png" alt="Logo" style="width:90px;height:90px;object-fit:contain;animation:splashPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both" />
  <div style="font-size:16px;font-weight:800;text-align:center;color:var(--text)">Generator QR Card<br/>MTS Al Huda Putri</div>
  <div style="width:140px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden">
    <div style="height:100%;background:#10b981;border-radius:2px;animation:splashLoad 1.5s 0.3s ease forwards;width:0"></div>
  </div>
</div>
<style>
  @keyframes splashPop  { from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1} }
  @keyframes splashLoad { from{width:0}to{width:100%} }
  .qr-footer{text-align:center;padding:12px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:8px}
  .qr-footer a{color:#10b981;text-decoration:none;font-weight:600}
  .theme-toggle-qr{background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:5px 10px;font-size:14px;cursor:pointer;color:var(--text);transition:all 0.2s}
</style>

<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <img src="../assets/icons/logo-mts.png" alt="Logo" style="width:32px;height:32px;object-fit:contain" />
    <div>
      <div class="header-title">🪪 Generator QR Card</div>
      <div class="header-sub">MTS Al Huda Putri Malang</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="theme-toggle-qr" id="qr-theme-btn" onclick="toggleQrTheme()">🌙</button>
    <a href="../dashboard/" class="back-btn">← Dashboard</a>
  </div>
</div>

<div class="container">

  <!-- ── Controls Panel ── -->
  <div class="controls">
    <div class="controls-title">⚙️ Pengaturan Kartu</div>
    <div class="controls-grid">
      <div class="form-group">
        <label class="form-label">Tipe</label>
        <select id="ctrl-tipe" class="form-select" onchange="onTipeChange()">
          <option value="siswa">🎓 Siswa</option>
          <option value="guru">👨‍🏫 Guru & Tendik</option>
        </select>
      </div>
      <div class="form-group" id="kelas-group">
        <label class="form-label">Filter Kelas</label>
        <select id="ctrl-kelas" class="form-select">
          <option value="">Semua Kelas</option>
          <!-- diisi oleh JS -->
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tema Warna</label>
        <select id="ctrl-theme" class="form-select">
          <option value="green">🟢 Hijau Emerald</option>
          <option value="blue">🔵 Biru Navy</option>
          <option value="purple">🟣 Ungu</option>
          <option value="gold">🟡 Emas/Coklat</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tahun Ajaran</label>
        <input id="ctrl-ta" class="form-input" type="text" value="" />
      </div>
    </div>
    <div class="controls-actions">
      <button class="btn btn-primary" onclick="generateCards()">🔄 Generate Kartu</button>
      <button class="btn btn-secondary" id="btn-print-all" onclick="printAll()" style="display:none">🖨️ Print Semua</button>
      <button class="btn btn-info" id="btn-print-selected" onclick="printSelected()" style="display:none">🖨️ Print Terpilih (<span id="selected-count">0</span>)</button>
      <button class="btn btn-secondary btn-sm" id="btn-select-all" onclick="selectAll()" style="display:none">☑️ Pilih Semua</button>
      <button class="btn btn-secondary btn-sm" id="btn-clear-sel" onclick="clearSelection()" style="display:none">✕ Hapus Pilihan</button>
    </div>
  </div>

  <!-- ── Search & Filter Bar ── -->
  <div class="search-bar-wrap search-bar-hidden" id="search-bar">
    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input id="search-input" type="search" placeholder="Cari nama, NIS, atau kelas…" oninput="filterCards()" autocomplete="off" />
    </div>
    <div class="search-count" id="search-count"></div>
  </div>

  <!-- ── Stats Bar ── -->
  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat-pill">Total: <span class="num" id="stat-total">0</span> kartu</div>
    <div class="stat-pill" id="stat-tampil-pill">Ditampilkan: <span class="num" id="stat-tampil">0</span></div>
    <div class="stat-pill selected-pill" id="stat-selected-pill" style="display:none">Dipilih: <span class="num" id="stat-selected">0</span></div>
  </div>

  <!-- ── Output ── -->
  <div id="output">
    <div class="loader">
      <div class="spinner"></div>
      <span>Klik "Generate Kartu" untuk memulai</span>
    </div>
  </div>

</div>

<div id="toast"></div>
<div class="qr-footer">Made with ❤️ by <a href="https://weverx.com" target="_blank" rel="noopener">weverx.com</a></div>

<script>
const API = APP_CONFIG.API_URL;
let currentData    = [];   // semua data dari server
let selectedCards  = new Set(); // set of idx yang dipilih untuk print
let totalVisible   = 0;

// ── Init ──
(function initQRCard() {
  const taInput = document.getElementById('ctrl-ta');
  if (taInput) taInput.value = APP_CONFIG.TAHUN_AJARAN || '2026/2027';

  const kelasSel  = document.getElementById('ctrl-kelas');
  const kelasList = APP_CONFIG.KELAS_LIST || ['VII', 'VIII', 'IX'];
  kelasList.forEach(k => {
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = 'Kelas ' + k;
    kelasSel.appendChild(opt);
  });
  onTipeChange();
})();

// ── Fetch data dari server ──
async function fetchData(tipe) {
  const action = tipe === 'siswa' ? 'get_students' : 'get_teachers';
  const sessionToken = sessionStorage.getItem('mts_session_token') || '';
  const res  = await fetch(`${API}?action=${action}&sessionToken=${sessionToken}&_t=${Date.now()}`, {
    redirect: 'follow', cache: 'no-store'
  });
  const text = await res.text();
  try {
    const json = JSON.parse(text);
    if (!json.success && json.code === 'UNAUTHORIZED') {
      throw new Error('Belum login. Silakan login ke Dashboard dulu, lalu buka Generator QR Card dari sana.');
    }
    return json.data || [];
  } catch(e) { throw new Error(e.message || 'Gagal ambil data'); }
}

function onTipeChange() {
  const tipe = document.getElementById('ctrl-tipe').value;
  document.getElementById('kelas-group').style.display = tipe === 'siswa' ? 'flex' : 'none';
}

// ── Generate semua kartu ──
async function generateCards() {
  const tipe  = document.getElementById('ctrl-tipe').value;
  const kelas = document.getElementById('ctrl-kelas').value;
  const theme = document.getElementById('ctrl-theme').value;
  const ta    = document.getElementById('ctrl-ta').value;

  document.getElementById('output').innerHTML = '<div class="loader"><div class="spinner"></div><span>Memuat data…</span></div>';
  hideSearchBar(); hideActionBtns(); hideStatsBar();
  selectedCards.clear(); updateSelectedCount();

  try {
    let data = await fetchData(tipe);
    if (kelas && tipe === 'siswa') data = data.filter(s => s.kelas === kelas);
    // Hanya tampilkan siswa AKTIF
    if (tipe === 'siswa') data = data.filter(s => !s.status || s.status === 'AKTIF');

    if (data.length === 0) {
      document.getElementById('output').innerHTML = '<div class="loader">Tidak ada data ditemukan</div>';
      return;
    }
    currentData = data;

    // Render kartu
    const cardsHtml = data.map((item, idx) => cardHtml(item, idx, tipe, theme, ta)).join('');
    document.getElementById('output').innerHTML = `<div class="cards-grid" id="cards-grid">${cardsHtml}</div>`;

    // Generate QR codes
    for (let i = 0; i < data.length; i++) {
      const canvas = document.getElementById(`qr-${i}`);
      if (canvas) await generateQR(canvas, qrValue(data[i], tipe));
    }

    // Tampilkan search bar & buttons
    showSearchBar(); showActionBtns();
    updateStats(data.length, data.length);
    document.getElementById('search-input').value = '';

    showToast('✅ ' + data.length + ' kartu berhasil dibuat');
  } catch(e) {
    document.getElementById('output').innerHTML = `<div class="loader" style="color:var(--danger)">❌ ${e.message}</div>`;
  }
}

// ── Buat HTML satu kartu ──
function cardHtml(item, idx, tipe, theme, ta) {
  const isSiswa  = tipe === 'siswa';
  const qrVal    = qrValue(item, tipe);
  const name     = item.nama || '-';
  const id       = isSiswa ? item.nis : item.nig;
  const sub      = isSiswa ? `Kelas ${item.kelas}` : (item.jabatan || item.tipe || 'Guru');
  const typeLabel = isSiswa ? 'KARTU PELAJAR' : 'KARTU TENDIK';
  const searchStr = `${name}|${id}|${isSiswa ? item.kelas : ''}`.toLowerCase();

  return `
  <div class="card-wrap-outer" id="wrap-${idx}" data-search="${searchStr}" data-idx="${idx}">
    <!-- Checkbox select -->
    <div class="card-select-overlay" id="sel-${idx}" onclick="toggleSelect(${idx})" title="Pilih untuk print"></div>

    <!-- Kartu -->
    <div class="card-preview theme-${theme}" onclick="toggleSelect(${idx})" title="Klik untuk pilih">
      <div class="card-deco card-deco-1"></div>
      <div class="card-deco card-deco-2"></div>
      <div class="card-header-row">
        <div class="card-school-icon">🕌</div>
        <div class="card-school-info">
          <div class="card-school-name">MTS Al Huda Putri Malang</div>
          <div class="card-year">TA ${ta}</div>
        </div>
      </div>
      <div class="card-body-row">
        <div class="card-qr"><canvas id="qr-${idx}" width="52" height="52"></canvas></div>
        <div class="card-info">
          <div class="card-type-label">${typeLabel}</div>
          <div class="card-name">${name}</div>
          <div class="card-id">${id}</div>
          <div class="card-class">${sub}</div>
        </div>
      </div>
      <div class="card-stripe"></div>
    </div>

    <!-- Tombol aksi cepat -->
    <div class="card-actions">
      <button class="btn btn-xs btn-info"    onclick="printOne(${idx})" title="Print kartu ini saja">🖨️ Print</button>
      <button class="btn btn-xs btn-secondary" onclick="toggleSelect(${idx})" title="Pilih/batal pilih">☑️ Pilih</button>
    </div>
  </div>`;
}

// ── QR value helper ──
function qrValue(item, tipe) {
  if (tipe === 'siswa') return `MTS-S-${item.nis}`;
  const isTU = item.tipe && (item.tipe.toLowerCase().includes('tu') || item.tipe.toLowerCase().includes('tendik'));
  return `${isTU ? 'MTS-TU-' : 'MTS-G-'}${item.nig}`;
}

// ══════════════════════════════════════════════════
// FILTER / SEARCH
// ══════════════════════════════════════════════════
function filterCards() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const wraps = document.querySelectorAll('.card-wrap-outer');
  let shown = 0;
  wraps.forEach(w => {
    const match = !q || w.dataset.search.includes(q);
    w.classList.toggle('hidden', !match);
    if (match) shown++;
  });
  totalVisible = shown;
  updateStats(currentData.length, shown);
  document.getElementById('search-count').textContent = q
    ? `${shown} dari ${currentData.length} hasil`
    : `${currentData.length} kartu`;
}

// ══════════════════════════════════════════════════
// SELECTION (PILIH KARTU TERTENTU)
// ══════════════════════════════════════════════════
function toggleSelect(idx) {
  if (selectedCards.has(idx)) {
    selectedCards.delete(idx);
    document.getElementById(`sel-${idx}`).classList.remove('checked');
    document.getElementById(`wrap-${idx}`).style.outline = '';
  } else {
    selectedCards.add(idx);
    document.getElementById(`sel-${idx}`).classList.add('checked');
    document.getElementById(`wrap-${idx}`).style.outline = '2px solid var(--primary)';
    document.getElementById(`wrap-${idx}`).style.borderRadius = '12px';
  }
  updateSelectedCount();
}

function selectAll() {
  const wraps = document.querySelectorAll('.card-wrap-outer:not(.hidden)');
  wraps.forEach(w => {
    const idx = parseInt(w.dataset.idx);
    if (!selectedCards.has(idx)) {
      selectedCards.add(idx);
      document.getElementById(`sel-${idx}`).classList.add('checked');
      w.style.outline = '2px solid var(--primary)';
      w.style.borderRadius = '12px';
    }
  });
  updateSelectedCount();
}

function clearSelection() {
  selectedCards.forEach(idx => {
    const selEl = document.getElementById(`sel-${idx}`);
    if (selEl) selEl.classList.remove('checked');
    const wrap = document.getElementById(`wrap-${idx}`);
    if (wrap) { wrap.style.outline = ''; wrap.style.borderRadius = ''; }
  });
  selectedCards.clear();
  updateSelectedCount();
}

function updateSelectedCount() {
  const n = selectedCards.size;
  document.getElementById('selected-count').textContent = n;
  const pill = document.getElementById('stat-selected-pill');
  document.getElementById('stat-selected').textContent = n;
  pill.style.display = n > 0 ? 'flex' : 'none';
}

// ══════════════════════════════════════════════════
// PRINT
// ══════════════════════════════════════════════════
function printAll() {
  // Hapus semua exclude class dulu
  document.querySelectorAll('.card-wrap-outer').forEach(w => w.classList.remove('print-exclude'));
  window.print();
}

function printSelected() {
  if (selectedCards.size === 0) {
    showToast('⚠️ Pilih minimal 1 kartu dulu dengan klik kartu atau tombol ☑️ Pilih', 4000);
    return;
  }
  // Exclude yang tidak dipilih
  document.querySelectorAll('.card-wrap-outer').forEach(w => {
    const idx = parseInt(w.dataset.idx);
    w.classList.toggle('print-exclude', !selectedCards.has(idx));
  });
  window.print();
  // Hapus exclude setelah print dialog
  setTimeout(() => {
    document.querySelectorAll('.print-exclude').forEach(w => w.classList.remove('print-exclude'));
  }, 1000);
}

// Print 1 kartu langsung (dari tombol 🖨️ Print di bawah kartu)
function printOne(idx) {
  document.querySelectorAll('.card-wrap-outer').forEach(w => {
    const i = parseInt(w.dataset.idx);
    w.classList.toggle('print-exclude', i !== idx);
  });
  showToast(`🖨️ Mencetak kartu #${idx + 1}…`);
  window.print();
  setTimeout(() => {
    document.querySelectorAll('.print-exclude').forEach(w => w.classList.remove('print-exclude'));
  }, 1000);
}

// ══════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════
function showSearchBar() {
  document.getElementById('search-bar').classList.remove('search-bar-hidden');
  document.getElementById('search-count').textContent = currentData.length + ' kartu';
}
function hideSearchBar()  { document.getElementById('search-bar').classList.add('search-bar-hidden'); }

function showActionBtns() {
  ['btn-print-all','btn-print-selected','btn-select-all','btn-clear-sel']
    .forEach(id => document.getElementById(id).style.display = '');
  document.getElementById('stats-bar').style.display = 'flex';
}
function hideActionBtns() {
  ['btn-print-all','btn-print-selected','btn-select-all','btn-clear-sel']
    .forEach(id => document.getElementById(id).style.display = 'none');
}
function hideStatsBar() { document.getElementById('stats-bar').style.display = 'none'; }
function updateStats(total, tampil) {
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-tampil').textContent  = tampil;
  document.getElementById('stats-bar').style.display  = 'flex';
}

// ══════════════════════════════════════════════════
// QR GENERATOR
// ══════════════════════════════════════════════════
async function generateQR(canvas, qrVal) {
  if (typeof QRCode !== 'undefined' && typeof QRCode.toCanvas === 'function' && !window._qrLibFailed) {
    try {
      await QRCode.toCanvas(canvas, qrVal, {
        width: 52, margin: 1,
        color: { dark: '#FFFFFF', light: '#00000000' }
      });
      return;
    } catch(e) {}
  }
  // Fallback: image API
  const img  = document.createElement('img');
  img.src    = 'https://api.qrserver.com/v1/create-qr-code/?size=52x52'
             + '&data=' + encodeURIComponent(qrVal)
             + '&bgcolor=000000&color=ffffff&format=png&qzone=1';
  img.width  = 52; img.height = 52; img.alt = qrVal;
  img.style.cssText = 'border-radius:4px;display:block;';
  img.onerror = function() {
    const span = document.createElement('div');
    span.style.cssText = 'width:52px;height:52px;font-size:6px;color:#fff;word-break:break-all;padding:2px;line-height:1.2;overflow:hidden';
    span.textContent = qrVal;
    canvas.parentNode.replaceChild(span, canvas);
  };
  canvas.parentNode.replaceChild(img, canvas);
}

// ══════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════
let toastTimer;
function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}
</script>

// Theme & Splash
(function(){
  const saved = localStorage.getItem('mts_theme');
  const isDark = saved ? saved === 'dark' : true;
  if (!isDark) {
    document.body.classList.add('light-mode');
    const btn = document.getElementById('qr-theme-btn');
    if (btn) btn.textContent = '☀️';
  }
  const splash = document.getElementById('splash-screen');
  if (splash) setTimeout(() => { splash.style.opacity='0'; splash.style.visibility='hidden'; }, 1600);
})();
function toggleQrTheme() {
  const isDark = !document.body.classList.contains('light-mode');
  if (isDark) { document.body.classList.add('light-mode'); document.getElementById('qr-theme-btn').textContent='☀️'; localStorage.setItem('mts_theme','light'); }
  else { document.body.classList.remove('light-mode'); document.getElementById('qr-theme-btn').textContent='🌙'; localStorage.setItem('mts_theme','dark'); }
}
</script>
