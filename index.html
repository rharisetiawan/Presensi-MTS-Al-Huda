<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presensi MTS Al Huda Putri</title>
  <meta name="description" content="Sistem Presensi Digital MTS Al Huda Putri Malang" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0a1628;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo { font-size: 64px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    h1 {
      font-size: 22px; font-weight: 800; text-align: center;
      background: linear-gradient(135deg, #10b981, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    p { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 40px; }
    .cards {
      display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
      max-width: 600px; width: 100%;
    }
    .card {
      background: #111f38;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      flex: 1; min-width: 200px; max-width: 260px;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
    .card.dashboard { border-color: rgba(16,185,129,0.3); }
    .card.dashboard:hover { border-color: #10b981; box-shadow: 0 12px 32px rgba(16,185,129,0.2); }
    .card.scanner  { border-color: rgba(59,130,246,0.3); }
    .card.scanner:hover  { border-color: #3b82f6; box-shadow: 0 12px 32px rgba(59,130,246,0.2); }
    .card-icon { font-size: 42px; margin-bottom: 12px; }
    .card-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
    .card.dashboard .card-title { color: #10b981; }
    .card.scanner  .card-title { color: #3b82f6; }
    .card-desc { font-size: 12px; color: #64748b; line-height: 1.6; }
    footer { margin-top: 48px; font-size: 11px; color: #475569; }
    footer a { color: #10b981; text-decoration: none; }
  </style>
</head>
<body>
  <div class="logo">🏫</div>
  <h1>Sistem Presensi MTS Al Huda Putri</h1>
  <p>Pilih aplikasi yang ingin dibuka:</p>

  <div class="cards">
    <a href="./dashboard/index.html" class="card dashboard">
      <div class="card-icon">📊</div>
      <div class="card-title">Dashboard Admin</div>
      <div class="card-desc">Kelola absensi, laporan, dan data siswa &amp; guru</div>
    </a>
    <a href="./scanner/index.html" class="card scanner">
      <div class="card-icon">📷</div>
      <div class="card-title">Scanner QR</div>
      <div class="card-desc">Scan kartu QR siswa &amp; guru di pintu gerbang</div>
    </a>
  </div>

  <footer>
    v2.1.0 &nbsp;·&nbsp; Made with ❤️ by <a href="https://weverx.com" target="_blank" rel="noopener">weverx.com</a>
  </footer>
</body>
</html>
